# Aksje-/fondsunivers for Oslo Børs Case-finner.
#
# Dette er en vanlig tekstfil du kan redigere selv (også fra GitHub sin
# nettleser-editor, fungerer fint fra iPad Safari):
# https://github.com/kjetilhovden-ui/B-rs/edit/main/data/manual/assets.yaml
#
# Felt:
#   ticker      Yahoo Finance-ticker. Aksjer på Oslo Børs bruker ".OL"
#               (f.eks. EQNR.OL). DNB-fond bruker Morningstar-stil koder
#               (f.eks. "0P0001EFNB.IR") siden fond ikke har vanlige tickere.
#   name        Visningsnavn i grensesnittet.
#   asset_type  "aksje" eller "fond".
#   sector      Fritekst, brukes til sektor-nedbrytning av treffsikkerhet.
#
# For å legge til en aksje: finn ticker på https://finance.yahoo.com/lookup
# og legg til en ny rad i samme format. Systemet håndterer ukjente/feilende
# tickere pent (viser "data ikke tilgjengelig" i stedet for å krasje), så det
# er trygt å eksperimentere.

assets:
