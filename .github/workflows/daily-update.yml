name: Daglig oppdatering

# Fase 1: kun manuell trigger (workflow_dispatch), slik at vi kan teste
# hele kjeden (hente data -> committe -> bygge -> deploye) før automatikk
# skrus på. Fase 2 legger til en "schedule:"-trigger her (cron, UTC) for
# å kjøre dette automatisk hver morgen man-fre.
on:
  workflow_dispatch: {}

concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: etl/requirements.txt

      - name: Installer Python-avhengigheter
        run: pip install -r etl/requirements.txt

      - name: Kjør daglig ETL (hent data, regn score, eksporter JSON)
        working-directory: etl
        run: python -m etl.run_daily

      - name: Committ oppdatert data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daglig dataoppdatering"
          file_pattern: "data/history.db frontend/public/data/*.json"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Installer frontend-avhengigheter
        working-directory: frontend
        run: npm ci

      - name: Bygg frontend
        working-directory: frontend
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: update-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
